<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Room • backbench</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-zinc-950 text-white min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full">
        <div onclick="window.location.href='index.html'" 
             class="inline-flex items-center gap-2 text-zinc-400 hover:text-white mb-10 cursor-pointer text-lg">
            ← Back
        </div>

        <div class="bg-zinc-900 border border-orange-500/30 rounded-3xl p-5 sm:p-8 shadow-2xl">
            <div class="text-center mb-8">
                <h2 class="text-3xl sm:text-4xl font-bold tracking-tighter mb-2">Create New Room</h2>
                <p class="text-zinc-400 text-sm sm:text-base">6-digit PIN • Auto or custom</p>
            </div>

            <!-- Fixed PIN Section -->
            <div class="flex gap-2 sm:gap-3">
                <input type="text" id="pinInput" maxlength="6"
                    class="flex-1 min-w-0 bg-zinc-950 border border-zinc-700 focus:border-orange-500 rounded-2xl py-5 sm:py-6 text-2xl sm:text-4xl text-center tracking-widest font-mono outline-none transition-all"
                    placeholder="000000"
                    oninput="this.value = this.value.replace(/[^0-9]/g,'')">

                <button onclick="generatePin()" 
                    class="w-16 sm:w-24 flex-shrink-0 bg-zinc-800 hover:bg-zinc-700 text-orange-400 px-2 sm:px-3 py-3 sm:py-4 rounded-2xl flex flex-col items-center justify-center transition-all">
                    <span class="text-xl sm:text-2xl leading-none">♻</span>
                    <span class="text-[9px] sm:text-[10px] mt-1 font-medium">NEW</span>
                </button>

            </div>
            <div class="text-center text-xs text-zinc-500 mt-2">
                <center>keep this secret</center>
            </div>
            <div>
                <button onclick="createRoom()" 
                    class="w-full mt-2 px-6 py-5 sm:py-6 bg-orange-500 hover:bg-orange-600 text-black font-semibold text-lg sm:text-xl rounded-3xl transition-all">
                    Create Room
                </button>
            </div>
            <p class="text-center text-xs text-zinc-500 mt-8">
                Anyone with this PIN can join
            </p>
        </div>
    </div>

    <script>
        async function createRoom() {
            const pin = document.getElementById('pinInput').value.trim();
        
            if (pin.length !== 6) {
                alert("❌ Enter a valid 6-digit PIN");
                return;
            }

            try {
            // Save for local use
                localStorage.setItem('roomPin', pin);

            // Send to backend
                const response = await fetch(
    "https://backbench-backend.onrender.com/create-room",
    {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ pin: pin })
    }
);

const data = await response.json();

console.log("Status:", response.status);
console.log("Response:", data);

if (data.success) {

    localStorage.setItem("roomPin", pin);

    alert("✅ Room Created!");

    window.location.href = "room.html";

} else {

    alert("❌ " + data.message);

}

            } catch (error) {

    console.error("FULL ERROR:", error);

    alert(error.message);

}
            }

            function generatePin() {
            const pin = Math.floor(100000 + Math.random() * 900000).toString();
            document.getElementById('pinInput').value = pin;
            }

            window.onload = generatePin;
    </script>
</body>
</html>
