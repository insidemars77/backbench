<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Room • backbench</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-zinc-950 text-white min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full">
        <div onclick="window.location.href='index.html'" 
             class="flex items-center gap-2 text-zinc-400 hover:text-white mb-8 cursor-pointer w-fit">
            ← Back to Home
        </div>

        <div class="bg-zinc-900/70 border border-orange-500/30 rounded-3xl p-6 sm:p-10 shadow-2xl">
            <div class="text-center mb-8 sm:mb-10">
                <h2 class="text-3xl sm:text-4xl font-bold tracking-tight mb-3">Join a Room</h2>
                <p class="text-zinc-400 text-sm sm:text-base">Enter the 6-digit PIN</p>
            </div>

            <input type="text" id="pinInput" maxlength="6" 
                   class="w-full bg-zinc-950 border border-zinc-700 focus:border-orange-500 rounded-2xl px-4 sm:px-8 py-5 sm:py-7 text-3xl sm:text-5xl text-center tracking-widest font-mono outline-none transition-all"
                   placeholder="000000" oninput="this.value = this.value.replace(/[^0-9]/g,'')">

            <button onclick="joinRoom()" 
                    class="mt-6 sm:mt-8 w-full py-5 sm:py-6 bg-orange-500 hover:bg-orange-600 text-black font-semibold text-lg sm:text-xl rounded-2xl transition-all active:scale-95">
                Join Room
            </button>
        </div>
    </div>

<script>
async function joinRoom() {

    const pin =
        document.getElementById("pinInput")
        .value
        .trim();

    if (pin.length !== 6) {

        alert("❌ Please enter a valid 6-digit PIN");
        return;

    }

    try {

        const response = await fetch(
            "https://backbench-backend.onrender.com/join-room",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    pin: pin
                })
            }
        );

        const data = await response.json();

        if (data.success) {

            localStorage.setItem("roomPin", pin);

            alert("✅ Room Found");

            window.location.href = "room.html";

        } else {

            alert("❌ " + data.message);

        }

    } catch (err) {

        console.error(err);

        alert("Server Error");

    }

}
</script>
</body>
</html>
