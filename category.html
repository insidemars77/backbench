<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uploads • Backbench</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600;700&amp;display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600;700&amp;display=swap');
        
        :root {
            --accent: #f97316;
        }
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
            background: #09090b;
            color: white;
        }
        
        .title-font {
            font-family: 'Space Grotesk', sans-serif;
        }

        .card {
            transition: all 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
        }
        
        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
        }

        .upload-card {
            border: 3px dashed #f97316;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
        }

        @media (max-width: 1280px) {
            .grid-container { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 1024px) {
            .grid-container { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 640px) {
            .grid-container { grid-template-columns: 1fr; }
        }

        .sidebar {
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
        }
        
        .sidebar.open {
            transform: translateX(0);
        }

        .msg-bubble, .tab-btn {
            transition: all 0.2s ease;
        }

        .fade-in {
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- TOP BAR - Matching room.html style -->
    <header class="bg-[#18181b] border-b border-[#f97316]/30 py-4 px-6 flex items-center justify-between flex-shrink-0">
        <div class="flex items-center gap-x-4">
            <!-- Back Button -->
            <button onclick="goBack()" 
                    class="flex items-center justify-center w-10 h-10 hover:bg-[#27272a] rounded-2xl text-zinc-400 hover:text-white">
                <i class="fa-solid fa-arrow-left text-xl"></i>
            </button>

            <!-- Logo -->
            <div class="flex items-center gap-x-3">
                <div style="width:36px;height:36px;background:#f97316;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;color:#1c0a00;">B</div>
                <div class="title-font text-3xl font-semibold tracking-tighter">backbench</div>
            </div>

            <!-- Category Info -->
            <div class="ml-8 pl-8 border-l border-zinc-700">
                <div class="flex items-center gap-x-3">
                    <div class="px-5 py-2 bg-[#27272a] text-orange-400 rounded-3xl text-sm font-medium flex items-center gap-x-2">
                        <i class="fa-solid fa-folder-open"></i>
                        <span id="category-name"></span>
                    </div>
                    <div class="px-4 py-2 bg-zinc-900 text-zinc-400 text-sm font-mono rounded-3xl">
                        PIN: <span id="room-pin"></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Side -->
        <div class="flex items-center gap-x-4">
            <!-- Search -->
            <div class="relative w-80">
                <input 
                    id="search-input"
                    type="text" 
                    placeholder="Search files in this category..."
                    onkeyup="filterFiles()"
                    class="w-full bg-[#27272a] border border-zinc-700 focus:border-[#f97316] focus:outline-none rounded-3xl py-3 px-5 pl-12 text-sm">
                <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-zinc-400"></i>
            </div>
        </div>
    </header>

    <div class="flex-1 p-8 overflow-auto">
        <div id="files-grid" class="grid-container max-w-screen-2xl mx-auto">
            <!-- Populated by JS -->
        </div>
    </div>

    <!-- RIGHT SIDEBAR -->
    <div id="sidebar" class="sidebar fixed top-0 right-0 h-full w-96 bg-[#18181b] border-l border-zinc-700 shadow-2xl z-50 overflow-y-auto">
        <div class="p-6">
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-xl font-semibold title-font">File Info</h2>
                <button onclick="closeSidebar()" class="text-3xl leading-none text-zinc-400 hover:text-white">×</button>
            </div>

            <div id="sidebar-icon" class="flex justify-center text-8xl mb-8"></div>

            <h1 id="sidebar-filename" class="title-font text-2xl font-semibold leading-tight mb-1"></h1>
            <p id="sidebar-type" class="text-orange-400 uppercase text-sm tracking-widest font-medium"></p>

            <div class="mt-10 grid grid-cols-2 gap-8 text-sm">
                <div>
                    <div class="text-zinc-400 text-xs">SIZE</div>
                    <div id="sidebar-size" class="font-medium text-lg"></div>
                </div>
                <div>
                    <div class="text-zinc-400 text-xs">UPLOADED</div>
                    <div id="sidebar-date" class="font-medium text-lg"></div>
                </div>
            </div>

            <div class="mt-12">
                <button onclick="downloadFile()" 
                        class="w-full bg-[#f97316] hover:bg-orange-600 text-black font-semibold py-4 rounded-3xl flex items-center justify-center gap-x-3">
                    <i class="fa-solid fa-download"></i>
                    DOWNLOAD
                </button>
            </div>

            <button onclick="closeSidebar()" 
                    class="w-full mt-4 py-4 text-zinc-400 hover:text-white font-medium">
                Close
            </button>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="hidden fixed bottom-8 left-1/2 -translate-x-1/2 bg-[#27272a] border border-[#f97316] text-white px-6 py-4 rounded-3xl shadow-2xl flex items-center gap-x-3 z-50">
        <i class="fa-solid fa-circle-check text-orange-400"></i>
        <span id="toast-text" class="font-medium"></span>
    </div>

<script>
    const params = new URLSearchParams(window.location.search);
    const roomPin = params.get("room");
    const categoryName = params.get("category");

    let allFiles = [];   // ← Global variable

    function renderFiles(filteredFiles) {
        const grid = document.getElementById("files-grid");
        grid.innerHTML = "";

        // === UPLOAD CARD (always shown first) ===
        const uploadCard = document.createElement("div");
        uploadCard.className = `upload-card bg-[#18181b] h-80 rounded-3xl flex flex-col items-center justify-center cursor-pointer hover:bg-[#27272a]`;
        uploadCard.innerHTML = `
            <div class="w-24 h-24 rounded-3xl border-4 border-dashed border-[#f97316] flex items-center justify-center mb-6">
                <i class="fa-solid fa-plus text-5xl text-orange-400"></i>
            </div>
            <div class="title-font text-2xl font-semibold text-orange-400">Upload File</div>
            <p class="text-zinc-400 mt-2">or drop files here</p>
        `;
        uploadCard.onclick = triggerFileUpload;
        grid.appendChild(uploadCard);

        // File Cards
        filteredFiles.forEach(file => {
            const card = document.createElement("div");
            card.className = `card bg-[#18181b] rounded-3xl overflow-hidden cursor-pointer`;
            card.innerHTML = `
                <div class="h-52 bg-gradient-to-br from-zinc-900 to-black flex items-center justify-center text-7xl border-b border-zinc-700">
                    ${file.icon || getIcon(file.name)}
                </div>
                <div class="p-5">
                    <div class="font-medium line-clamp-2 h-12">${file.name}</div>
                    <div class="flex justify-between text-xs mt-6">
                        <div>
                            <div class="text-zinc-400">${file.size || '—'}</div>
                            <div class="text-zinc-500">${file.date || '—'}</div>
                        </div>
                        <div class="px-3 py-1 bg-zinc-800 rounded-2xl text-[10px] font-mono uppercase tracking-widest self-end">
                            ${file.type || 'FILE'}
                        </div>
                    </div>
                </div>
            `;
            card.onclick = () => openSidebar(file);
            grid.appendChild(card);
        });
    }

    async function loadFiles() {

        try {

            const response = await fetch(
                `http://localhost:8080/files/${roomPin}/${categoryName}`
            );

            console.log("Status:", response.status);

            const files = await response.json();

            console.log("Files from server:", files);

            const formattedFiles = files.map(file => {

                console.log("Processing:", file);

            return {

                id: file._id,

                name: file.fileName,

                type: file.mimeType,

                size: file.size + " bytes",

                date: new Date(file.createdAt).toLocaleDateString(),

                icon: getIcon(file.fileName)

            };

            });

            console.log("Formatted:", formattedFiles);

            allFiles = formattedFiles;

            renderFiles(allFiles);

        } catch (err) {

            console.error("❌ Load error:", err);

        }

    }

    let currentFile = null;

    function openSidebar(file) {
        currentFile = file;
        document.getElementById("sidebar-icon").innerHTML = file.icon || getIcon(file.name);
        document.getElementById("sidebar-filename").textContent = file.name;
        document.getElementById("sidebar-type").textContent = (file.type || 'FILE').toUpperCase();
        document.getElementById("sidebar-size").textContent = file.size || '—';
        document.getElementById("sidebar-date").textContent = file.date || '—';
        document.getElementById("sidebar").classList.add("open");
    }

    function closeSidebar() {
        document.getElementById("sidebar").classList.remove("open");
    }

    function filterFiles() {
        const query = document.getElementById("search-input").value.toLowerCase().trim();
        if (!query) {
            renderFiles(allFiles);
            return;
        }
        const filtered = allFiles.filter(f => 
            f.name.toLowerCase().includes(query)
        );
        renderFiles(filtered);
    }

    async function triggerFileUpload() {
        const input = document.createElement("input");
        input.type = "file";
        input.onchange = async () => {
            const file = input.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append("file", file);
            formData.append("roomPin", roomPin);
            formData.append("category", categoryName);

            try {
                const response = await fetch("http://localhost:8080/upload", {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();
                console.log(data);

                if (data.success) {
                    showToast(`✅ Uploaded: ${file.name}`);
                    loadFiles(); // Refresh the list
                } else {
                    showToast("❌ Upload failed");
                }
            } catch (err) {
                console.error(err);
                showToast("❌ Upload error - is server running?");
            }
        };
        input.click();
    }

    function getIcon(filename) {
        const ext = filename.split('.').pop().toLowerCase();
        const map = { 
            pdf: "📕", pptx: "📊", docx: "📝", 
            png: "🖼️", jpg: "🖼️", jpeg: "🖼️", 
            mp4: "🎥", zip: "📦", txt: "📄" 
        };
        return map[ext] || "📄";
    }

    async function downloadFile() {

        if (!currentFile) return;

        try {

            const response = await fetch(
                `http://localhost:8080/download/${currentFile.id}`
            );

            const data = await response.json();

            window.open(data.url, "_blank");

        } catch (err) {

            console.error(err);
            showToast("Download failed");

        }

    }

    function showToast(msg) {
        const toast = document.getElementById("toast");
        document.getElementById("toast-text").innerHTML = msg;
        toast.classList.remove("hidden");
        setTimeout(() => toast.classList.add("hidden"), 3000);
    }

    function goBack() {
        window.location.href = "room.html";
    }

    // Keyboard shortcut
    document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeSidebar();
    });

    // Init
    window.onload = () => {
        document.getElementById("category-name").textContent = categoryName || "Unknown";
        document.getElementById("room-pin").textContent = roomPin || "—";
        loadFiles();
    };
</script>
</body>
</html>
