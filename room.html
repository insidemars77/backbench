<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room • backbench</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-zinc-950 text-white min-h-screen flex flex-col">
    <!-- Top Bar -->
    <header class="bg-zinc-900 border-b border-orange-500/30 px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <div class="w-9 h-9 bg-orange-500 rounded-2xl flex items-center justify-center font-bold text-2xl">B</div>
            <div>
                <h1 class="text-2xl font-bold tracking-tight">backbench</h1>
                <p class="text-sm text-zinc-400">Room PIN: <span id="roomPin" class="text-orange-400 font-mono font-semibold">874392</span></p>
            </div>
        </div>
        
        <div class="flex items-center gap-6">
            <div class="flex items-center gap-2 bg-zinc-800 px-4 py-2 rounded-2xl">
                <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
                <span class="text-sm">
                <span id="onlineCount">1</span> online
                </span>
            </div>
            <button onclick="copyPin()" 
                    class="flex items-center gap-2 bg-zinc-800 hover:bg-zinc-700 px-5 py-2 rounded-2xl transition">
                📋 Copy PIN
            </button>
            <button onclick="leaveRoom()" 
                    class="text-red-400 hover:text-red-500 transition">Leave Room</button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <!-- Chat Section -->
        <div class="flex-1 flex flex-col border-r border-zinc-800">
            <div class="p-6 border-b border-zinc-800">
                <h2 class="text-xl font-semibold flex items-center gap-2">
                    💬 Team Chat
                </h2>
            </div>
            
            <!-- Messages Area -->
            <div id="chatArea" class="flex-1 p-6 overflow-y-auto space-y-6 bg-zinc-950">
                plz be toxic!
            </div>

            <!-- Message Input -->
            <div class="p-6 border-t border-zinc-800 bg-zinc-900">
                <div class="flex gap-3">
                    <input type="text" id="messageInput" 
                           class="flex-1 bg-zinc-800 border border-zinc-700 focus:border-orange-500 rounded-2xl px-6 py-4 outline-none"
                           placeholder="Type a message...">
                    <button onclick="sendMessage()" 
                            class="bg-orange-500 hover:bg-orange-600 text-black px-8 rounded-2xl font-semibold transition">
                        Send
                    </button>
                </div>
            </div>
        </div>

        <!-- File Management Section -->
        <div class="w-96 bg-zinc-900 border-l border-zinc-800 flex flex-col">
            <div class="p-6 border-b border-zinc-800">
                <h2 class="text-xl font-semibold flex items-center gap-2">
                    📁 Files
                </h2>
            </div>
            
            <div class="flex-1 p-6 overflow-y-auto space-y-3">
                <!-- Sample files -->
                <div class="bg-zinc-800 p-4 rounded-2xl flex items-center gap-4 hover:bg-zinc-700 transition">
                    <div class="text-3xl">📄</div>
                    <div class="flex-1">
                        <p class="font-medium">Project_Brief.pdf</p>
                        <p class="text-xs text-zinc-400">Uploaded by Sarah • 2 hours ago</p>
                    </div>
                    <button class="text-orange-400 text-sm">Download</button>
                </div>
                
                <div class="bg-zinc-800 p-4 rounded-2xl flex items-center gap-4 hover:bg-zinc-700 transition">
                    <div class="text-3xl">🖼️</div>
                    <div class="flex-1">
                        <p class="font-medium">wireframe-v2.fig</p>
                        <p class="text-xs text-zinc-400">Uploaded by You • Just now</p>
                    </div>
                    <button class="text-orange-400 text-sm">Download</button>
                </div>
            </div>

            <!-- Upload Area -->
            <div class="p-6 border-t border-zinc-800">
                <label class="block w-full cursor-pointer">
                    <div class="border-2 border-dashed border-orange-500/50 hover:border-orange-500 rounded-3xl p-8 text-center transition">
                        <div class="text-4xl mb-3">⬆️</div>
                        <p class="font-medium">Upload File</p>
                        <p class="text-xs text-zinc-400 mt-1">Drag & drop or click</p>
                    </div>
                    <input type="file" class="hidden">
                </label>
            </div>
        </div>
    </div>
</body>

<script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>

<script>
    const socket = io("http://localhost:8080");

    function copyPin() {
        const pin = document.getElementById('roomPin').textContent;
        navigator.clipboard.writeText(pin);
        alert("PIN copied to clipboard!");
    }

    function sendMessage() {

        const input = document.getElementById('messageInput');
        const message = input.value.trim();

        if (!message) return;

        const room = localStorage.getItem("roomPin");

        socket.emit("send-message", {
            room: room,
            message: message
        });

        input.value = "";
    }

    socket.on("receive-message", (data) => {

        const chatArea = document.getElementById("chatArea");

        const msg = document.createElement("div");

        msg.className = "flex gap-4";

        msg.innerHTML = `
            <div>
                <p class="text-zinc-300">${data.message}</p>
            </div>
        `;

        chatArea.appendChild(msg);

        chatArea.scrollTop = chatArea.scrollHeight;
    });

    function leaveRoom() {

        if (confirm("Leave this room?")) {

            localStorage.removeItem("roomPin");
            window.location.href = "index.html";

        }
    }

    window.onload = () => {

        const pin = localStorage.getItem("roomPin");

        if (!pin) {

            alert("No room selected!");
            window.location.href = "index.html";
            return;

        }

        document.getElementById("roomPin").textContent = pin;

        loadMessages(pin);

        socket.emit("join-room", pin);

        console.log("Joined room:", pin);

    };

    async function loadMessages(pin) {

    const response =
        await fetch(
            `http://localhost:8080/messages/${pin}`
        );

    const messages =
        await response.json();

    const chatArea =
        document.getElementById(
            "chatArea"
        );

    chatArea.innerHTML = "";

    messages.forEach((msg) => {

        const div =
            document.createElement(
                "div"
            );

        div.innerHTML = `
            <p class="text-zinc-300">
                ${msg.text}
            </p>
        `;

        chatArea.appendChild(div);

    });

}
</script>
</html>
