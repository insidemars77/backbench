<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room • backbench</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden;
        }

        body {
            background: #09090b;
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
        }

        /* ── FIXED HEADER ── */
        #topBar {
            flex-shrink: 0;
            background: #18181b;
            border-bottom: 1px solid rgba(249, 115, 22, 0.3);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 50;
        }

        /* ── FIXED TABS ── */
        #tabBar {
            flex-shrink: 0;
            display: flex;
            background: #18181b;
            border-bottom: 1px solid #27272a;
            z-index: 40;
        }

        /* ── MAIN BODY ── */
        #mainBody {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── CONTENT WRAPPER ── */
        #contentWrapper {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* ── TAB BUTTONS ── */
        .tab-btn {
            padding: 16px 32px;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            border: none;
            background: none;
            color: #a1a1aa;
            border-bottom: 2px solid transparent;
            transition: color 0.15s, border-color 0.15s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Inter', sans-serif;
        }
        .tab-btn.active {
            color: white;
            border-bottom-color: #f97316;
        }
        .tab-btn:hover:not(.active) { color: white; }

        /* ── TAB CONTENTS ── */
        .tab-content {
            display: none;
            flex: 1;
            flex-direction: column;
            overflow: hidden;
        }
        .tab-content.active { display: flex; }

        /* ── SCROLLABLE CHAT AREA ── */
        #chatArea {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scrollbar-width: thin;
            scrollbar-color: #71717a #27272a;
        }
        #chatArea::-webkit-scrollbar { width: 6px; }
        #chatArea::-webkit-scrollbar-thumb { background-color: #71717a; border-radius: 20px; }
        #chatArea::-webkit-scrollbar-thumb:hover { background-color: #a3a3a3; }

        /* ── FIXED INPUT BAR ── */
        #messageInputBar {
            flex-shrink: 0;
            background: #18181b;
            border-top: 1px solid #3f3f46;
            padding: 20px 24px;
        }

        /* ── MESSAGE BUBBLES ── */
        .msg-bubble {
            background: #27272a;
            border-radius: 16px;
            padding: 12px 16px;
            max-width: 72%;
            align-self: flex-start;
        }
        .msg-bubble.own {
            background: #f97316;
            align-self: flex-end;
        }
        .msg-bubble p {
            color: #d4d4d8;
            margin: 0;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
        }
        .msg-bubble.own p { color: #1c0a00; }

        /* ── FILES SIDEBAR ── */
        #filesSidebar {
            width: 360px;
            flex-shrink: 0;
            background: #18181b;
            border-left: 1px solid #27272a;
            display: flex;
            flex-direction: column;
        }

        /* ── NOTES EDITOR ── */
        #notesEditor {
            flex: 1;
            resize: none;
            background: transparent;
            border: none;
            outline: none;
            color: #e4e4e7;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            line-height: 1.8;
            padding: 0;
            width: 100%;
        }
        #notesEditor::placeholder { color: #52525b; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .msg-bubble { animation: fadeIn 0.15s ease; }
    </style>
</head>
<body>

    <!-- ── FIXED TOP BAR ── -->
    <header id="topBar">
        <div style="display:flex;align-items:center;gap:16px;">
            <div style="width:36px;height:36px;background:#f97316;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;color:#1c0a00;">B</div>
            <div>
                <h1 style="margin:0;font-size:20px;font-weight:700;letter-spacing:-0.5px;font-family:'Space Grotesk',sans-serif;">backbench</h1>
                <p style="margin:0;font-size:13px;color:#a1a1aa;">Room PIN: <span id="roomPin" style="color:#fb923c;font-family:monospace;font-weight:600;">874392</span></p>
            </div>
        </div>
        <div style="display:flex;align-items:center;gap:12px;">
            <div style="display:flex;align-items:center;gap:8px;background:#27272a;padding:8px 16px;border-radius:16px;">
                <div style="width:10px;height:10px;background:#22c55e;border-radius:50%;animation:pulse 2s infinite;"></div>
                <span style="font-size:13px;"><span id="onlineCount">1</span> online</span>
            </div>
            <button onclick="copyPin()" style="display:flex;align-items:center;gap:6px;background:#27272a;border:none;color:white;cursor:pointer;padding:8px 20px;border-radius:16px;font-size:13px;font-family:'Inter',sans-serif;">
                📋 Copy PIN
            </button>
            <button onclick="leaveRoom()" style="background:none;border:none;color:#f87171;cursor:pointer;font-size:13px;font-family:'Inter',sans-serif;">
                Leave Room
            </button>
        </div>
    </header>

    <!-- ── MAIN BODY ── -->
    <div id="mainBody">

        <!-- FIXED TABS -->
        <div id="tabBar">
            <button class="tab-btn active" id="tab-0" onclick="switchTab(0)">💬 Chats</button>
            <button class="tab-btn"        id="tab-1" onclick="switchTab(1)">📝 Notes</button>
            <button class="tab-btn"        id="tab-2" onclick="switchTab(2)">⚙️ Work in Progress</button>
        </div>

        <!-- CONTENT WRAPPER -->
        <div id="contentWrapper">

            <!-- ── CHATS TAB ── -->
            <div id="content-0" class="tab-content active">
                <div id="chatArea"></div>
                <div id="messageInputBar">
                    <div style="display:flex;gap:12px;">
                        <textarea
                            id="messageInput"
                            rows="2"
                            placeholder="Type a message..."
                            style="
                            flex:1;
                            background:#27272a;
                            border:1px solid #3f3f46;
                            color:white;
                            border-radius:16px;
                            padding:14px 20px;
                            outline:none;
                            font-size:14px;
                            font-family:'Inter',sans-serif;
                            resize:none;
                            "
                        ></textarea>
                        <button onclick="sendMessage()"
                                style="background:#f97316;border:none;color:#1c0a00;padding:14px 28px;border-radius:16px;font-weight:600;cursor:pointer;font-size:14px;font-family:'Inter',sans-serif;">
                            Send
                        </button>
                    </div>
                </div>
            </div>

            <!-- ── NOTES TAB ── -->
            <div id="content-1" class="tab-content">

                <div
                    id="categoryGrid"
                    style="
                    flex:1;
                    overflow-y:auto;
                    padding:30px;
                    display:grid;
                    grid-template-columns:repeat(4,1fr);
                    gap:24px;
                    align-content:start;
                    ">

                    <!-- Create Category Box -->
                    <div
                        onclick="createCategory()"
                        style="
                        height:180px;
                        background:#18181b;
                        border:2px dashed #3f3f46;
                        border-radius:24px;
                        display:flex;
                        flex-direction:column;
                        justify-content:center;
                        align-items:center;
                        cursor:pointer;
                        transition:.2s;
                        "
                        onmouseenter="this.style.borderColor='#f97316'"
                        onmouseleave="this.style.borderColor='#3f3f46'">

                        <div style="font-size:54px;">+</div>

                        <div
                            style="
                            margin-top:10px;
                            color:#a1a1aa;
                            font-weight:600;
                            ">
                            Create Category
                        </div>

                    </div>

                </div>

            </div>

            <!-- ── WORK IN PROGRESS TAB ── -->
            <div id="content-2" class="tab-content">
                <div style="flex:1;padding:32px;overflow-y:auto;">
                    <h2 style="margin:0 0 24px;font-size:20px;font-weight:600;">Work in Progress</h2>
                    <div style="background:#18181b;border-radius:24px;padding:40px;text-align:center;">
                        <div style="font-size:56px;margin-bottom:16px;">🚧</div>
                        <p style="color:#71717a;font-size:16px;margin:0;">This feature is under development</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <script>
        const socket = io("https://backbench-backend.onrender.com");
        let mySocketId = null;
        const pendingSent = new Set(); // track messages we sent to detect our own echo

        // ── TAB SWITCHING ──
        function switchTab(idx) {
            document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
            document.querySelectorAll('.tab-content').forEach((c, i) => c.classList.toggle('active', i === idx));
        }

        // ── COPY PIN ──
        function copyPin() {
            const pin = document.getElementById('roomPin').textContent;
            navigator.clipboard.writeText(pin).then(() => alert("PIN copied to clipboard!"));
        }

        // ── LEAVE ROOM ──
        function leaveRoom() {
            if (confirm("Leave this room?")) {
                localStorage.removeItem("roomPin");
                window.location.href = "index.html";
            }
        }

        // ── SEND MESSAGE ──
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message) return;

            const room = localStorage.getItem("roomPin");
            // Mark this text as ours so the echo can be identified
            pendingSent.add(message);
            socket.emit("send-message", { room, message, senderId: mySocketId });
            input.value = "";
        }

        // ── RECEIVE ALL MESSAGES (including own echo from server) ──
        socket.on("receive-message", (data) => {
            // Method 1: backend forwards senderId
            if (data.senderId) {
                renderMessage(data.message, data.senderId === mySocketId);
                return;
            }
            // Method 2: fallback — check if we sent this text
            if (pendingSent.has(data.message)) {
                pendingSent.delete(data.message);
                renderMessage(data.message, true);
                return;
            }
            renderMessage(data.message, false);
        });

        // ── RENDER A MESSAGE BUBBLE ──
        function renderMessage(text, isOwn) {
            const chatArea = document.getElementById("chatArea");
            const div = document.createElement("div");
            div.className = "msg-bubble" + (isOwn ? " own" : "");
            div.innerHTML = `<p>${escapeHTML(text)}</p>`;
            chatArea.appendChild(div);
            scrollToBottom();
        }

        // ── ESCAPE HTML ──
        function escapeHTML(str) {
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        // ── SCROLL TO BOTTOM ──
        function scrollToBottom() {
            const chatArea = document.getElementById("chatArea");
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // ── FILE UPLOAD (placeholder handler) ──
        function handleFileUpload(input) {
            const file = input.files[0];
            if (!file) return;
            alert(`"${file.name}" selected. Connect your backend to handle uploads.`);
        }

        // ── ON LOAD ──
        window.onload = () => {
            const pin = localStorage.getItem("roomPin");
            if (!pin) {
                alert("No room selected!");
                window.location.href = "index.html";
                return;
            }

            document.getElementById("roomPin").textContent = pin;
            socket.emit("join-room", pin);
            loadMessages(pin);
            loadCategories();
        };

        socket.on("connect", () => {
            mySocketId = socket.id;
        });

        // ── LOAD HISTORY ──
        async function loadMessages(pin) {
            try {
                const response = await fetch(`https://backbench-backend.onrender.com/messages/${pin}`);
                const messages = await response.json();
                const chatArea = document.getElementById("chatArea");
                chatArea.innerHTML = "";
                messages.forEach((msg) => {
                    const div = document.createElement("div");
                    div.className = "msg-bubble";
                    div.innerHTML = `<p>${escapeHTML(msg.text)}</p>`;
                    chatArea.appendChild(div);
                });
                scrollToBottom();
            } catch (e) {
                console.log("Failed to load messages:", e);
            }
        }

        async function createCategory(){

            const name = prompt("Category name");

            if(!name) return;

            const roomPin = localStorage.getItem("roomPin");

            const response = await fetch(
                "http://backbench-backend.onrender.com/create-category",
                {
                    method:"POST",
                    headers:{
                        "Content-Type":"application/json"
                    },
                    body:JSON.stringify({
                        roomPin,
                        name
                    })
                }
            );

            const data = await response.json();

            if(data.success){
                loadCategories();
                console.log("loads category");
            }else{
                alert(data.message);
            }
        }

        async function loadCategories(){

            const roomPin = localStorage.getItem("roomPin");

            const response = await fetch(
                `http://backbench-backend.onrender.com/categories/${roomPin}`
            );

            const categories = await response.json();

            renderCategories(categories);

        }

        function renderCategories(categories){

            const container = document.getElementById("categoryGrid");

            container.innerHTML = "";

            // ---------- Create Category Card ----------
            const create = document.createElement("div");

            create.onclick = createCategory;

            create.style.cssText = `
                height:180px;
                background:#18181b;
                border:2px dashed #3f3f46;
                border-radius:24px;
                display:flex;
                flex-direction:column;
                justify-content:center;
                align-items:center;
                cursor:pointer;
                transition:.2s;
            `;

            create.innerHTML = `
                <div style="font-size:54px;">+</div>
                <div style="margin-top:10px;color:#a1a1aa;font-weight:600;">
                    Create Category
                </div>
            `;

            container.appendChild(create);

            // ---------- Categories ----------
            categories.forEach(category => {

                const div = document.createElement("div");

                div.style.cssText = `
                    height:180px;
                    background:#18181b;
                    border-radius:24px;
                    display:flex;
                    justify-content:center;
                    align-items:center;
                    font-size:22px;
                    font-weight:700;
                    cursor:pointer;
                    transition:.2s;
                `;

                div.innerHTML = `📁 ${category.name}`;

                div.onmouseenter = () => div.style.background = "#27272a";
                div.onmouseleave = () => div.style.background = "#18181b";

                container.appendChild(div);

            });

        }

    </script>
</body>
</html>
